services:
  - type: web
    name: rental-crm-api
    runtime: node
    region: oregon
    plan: starter
    # Cheap, dependency-free liveness probe. Lets Render detect a wedged
    # instance and restart it (single-instance starter has no peer to route to)
    # rather than letting requests hit a hung process and time out at the edge.
    healthCheckPath: /livez
    # --prod=false: NODE_ENV=production would otherwise skip devDependencies,
    # but the build needs tsup (devDep). Runtime then uses only dist/ + prod
    # deps -- tsx is no longer needed at runtime.
    buildCommand: npm install -g pnpm@11.1.2 && pnpm install --prod=false && pnpm --filter ./api build
    startCommand: pnpm --filter ./api start
    envVars:
      - key: NODE_ENV
        value: production
      # Must track .nvmrc / engines (>=22) -- pnpm 11 itself needs node:sqlite.
      - key: NODE_VERSION
        value: "22"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # HMAC secret shared with the transport repo, which mints per-address
      # email-unsubscribe URLs statelessly. Unset -> the public unsubscribe
      # endpoint 503s (and the transport must not emit List-Unsubscribe headers).
      - key: UNSUBSCRIBE_HMAC_SECRET
        sync: false
      # Global receiving domain for tokenized email reply addresses
      # (t-<token>@<domain>). Global config, not per-account. Unset -> email
      # thread creation 503s. Inbound mail for this domain must route to the
      # transport's webhook (ops).
      - key: EMAIL_REPLY_DOMAIN
        sync: false
      # Optional parent domain for per-account branded reply subdomains
      # (<local>@<label>.<parent>). Unset -> accounts use EMAIL_REPLY_DOMAIN.
      - key: EMAIL_PLATFORM_PARENT_DOMAIN
        sync: false
      # Public origin of the FRONTEND app -- the host that serves the tenant
      # condition-form page core links to in renewal email
      # (/capture/<secret>). This is the frontend origin, NOT this API's URL;
      # in production it is the same origin configured in
      # CORS_ALLOWED_ORIGINS. Unset -> links fall back to a dead
      # https://app.example host (logged as a warning) and no tenant can open
      # their form, so this must be set here even though it is schema-optional.
      - key: APP_BASE_URL
        sync: false

  # ==========================================================================
  # Comms evidence retention (cron)
  # ==========================================================================
  # Removes archived provider-webhook blobs after the configured horizon while
  # preserving the audit-anchored provenance rows. Legal holds skip destruction.
  # Keeping this in Render IaC makes the retention policy executable, not just
  # prose in docs/comms-evidence.md.
  - type: cron
    name: evidence-retention
    runtime: node
    region: oregon
    schedule: "30 3 * * *"
    buildCommand: npm install -g pnpm@11.1.2 && pnpm install --prod=false && pnpm --filter ./api build
    startCommand: pnpm --filter ./api retention:evidence
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # ==========================================================================
  # Maintenance janitors (cron)
  # ==========================================================================
  # Reviewable schedule for the SQL janitors that used to live only as
  # migration comments/runbook notes: tenancy status advancement, inbound raw
  # retention, idempotency-key pruning, IP rate bucket pruning, and audit-chain
  # sweep alerts.
  - type: cron
    name: maintenance-janitors
    runtime: node
    region: oregon
    schedule: "45 3 * * *"
    buildCommand: npm install -g pnpm@11.1.2 && pnpm install --prod=false && pnpm --filter ./api build
    startCommand: pnpm --filter ./api janitors:maintenance
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # ==========================================================================
  # Automatic rent-charge generator (cron)
  # ==========================================================================
  # Phase 9 shipped generate_rent_charges() as an idempotent, opt-in generator
  # but deliberately left it UNSCHEDULED ("define, don't schedule") with only an
  # ops note to "schedule operationally after deploy" — which never happened,
  # twice. This service IS that schedule, now living in reviewable IaC instead
  # of a runbook: it runs `charges:generate` (api/src/admin/run-rent-charges.ts),
  # which calls generate_rent_charges once per opted-in account (see ADR-0011).
  #
  # Daily at 08:00 UTC — early US morning (00:00-05:00 across US timezones), so
  # a charge lands overnight and is waiting when the landlord/tenant wakes,
  # while staying clear of the midnight boundary where date math is touchiest.
  # The exact minute does not matter for correctness: the generator is
  # idempotent (ON CONFLICT on (source_schedule_id, period_start)) and bills in
  # ADVANCE (next period's charge the day after this period's due date), so a
  # missed, delayed, or retried run cannot double-bill and always has slack to
  # heal on the following day's run.
  - type: cron
    name: rent-charge-generator
    runtime: node
    region: oregon
    schedule: "0 8 * * *"
    # Same build as the web service: --prod=false keeps devDeps (tsx) that the
    # `charges:generate` runner needs at runtime.
    buildCommand: npm install -g pnpm@11.1.2 && pnpm install --prod=false && pnpm --filter ./api build
    startCommand: pnpm --filter ./api charges:generate
    envVars:
      - key: NODE_ENV
        value: production
      # Must track .nvmrc / engines (>=22) -- pnpm 11 itself needs node:sqlite.
      - key: NODE_VERSION
        value: "22"
      # The runner uses the service-role admin client (getAdminClient); loadEnv
      # still requires SUPABASE_URL + SUPABASE_ANON_KEY at boot. SUPABASE_DB_URL
      # is not used by this job but is declared for env parity with the web
      # service. sync:false — set per-environment in the Render dashboard.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
