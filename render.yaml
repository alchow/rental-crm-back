services:
  - type: web
    name: rental-crm-api
    runtime: node
    region: oregon
    plan: starter
    # Cheap, dependency-free liveness probe. Lets Render detect a wedged
    # instance and restart it (single-instance starter has no peer to route to)
    # rather than letting requests hit a hung process and time out at the edge.
    healthCheckPath: /livez
    # --prod=false: NODE_ENV=production would otherwise skip devDependencies,
    # but the build needs tsup (devDep). Runtime then uses only dist/ + prod
    # deps -- tsx is no longer needed at runtime.
    buildCommand: npm install -g pnpm@11.1.2 && pnpm install --prod=false && pnpm --filter ./api build
    startCommand: pnpm --filter ./api start
    envVars:
      - key: NODE_ENV
        value: production
      # Must track .nvmrc / engines (>=22) -- pnpm 11 itself needs node:sqlite.
      - key: NODE_VERSION
        value: "22"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Resend transactional email. Both unset -> mailer falls back to a stub
      # that logs instead of sending. Set both to enable real delivery.
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      # The ONE provider-verified sending domain for per-account email
      # identities (accounts.email_slug -> "<slug>@<domain>"). Verified once
      # at Resend + DNS (ops); per-account slugs need no provider/DNS work.
      # Unset -> per-account identities off, every send uses MAIL_FROM.
      - key: ACCOUNT_EMAIL_DOMAIN
        sync: false
      # HMAC secret shared with the transport repo, which mints per-address
      # email-unsubscribe URLs statelessly. Unset -> the public unsubscribe
      # endpoint 503s (and the transport must not emit List-Unsubscribe headers).
      - key: UNSUBSCRIBE_HMAC_SECRET
        sync: false
      # Global receiving domain for tokenized email reply addresses
      # (t-<token>@<domain>). Global config, not per-account. Unset -> email
      # thread creation 503s. Inbound mail for this domain must route to the
      # transport's webhook (ops).
      - key: EMAIL_REPLY_DOMAIN
        sync: false
      # Cutover flag for core-originated transactional email. ON -> the renewal
      # email is written to the comms outbox (transport dials); OFF/unset ->
      # the legacy in-core mailer sends directly.
      - key: COMMS_EMAIL_PIPELINE
        sync: false
