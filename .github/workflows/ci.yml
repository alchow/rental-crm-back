name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan all commits on PRs.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No GITLEAKS_LICENSE: this repo is private-org-scoped under a
          # personal account / small org. If gitleaks-action ever requires
          # it (paid-org enforcement), set it as a repo secret.

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Service-role quarantine (grep)
        run: pnpm lint:service-role

      - name: Admin quarantine (ESLint rule regression)
        run: pnpm lint:admin-quarantine

      - name: Unit tests (vitest)
        # JWT middleware (ES256/JWKS, algorithm confusion) + the validation-
        # envelope guard (defaultHook does not inherit across .route()
        # mounts; this protects the newApiApp() factory invariant). New unit
        # tests land here as *.spec.ts; the tsx scripts below are the
        # integration tier.
        run: pnpm --filter ./api test:unit

      - name: API production build (tsup bundle)
        # `start` runs node dist/index.js in prod; make sure the bundle
        # actually builds from a clean tree.
        run: pnpm --filter ./api build

      - name: Contract drift (OpenAPI + SDK regenerated cleanly)
        # The committed openapi/openapi.json and sdk/src/generated/types.ts
        # are the source-of-truth client contract. Regenerate them from the
        # zod schemas; if the diff is non-empty, a route or schema changed
        # without the spec/SDK being committed -- the brief calls this
        # "SDK builds from the spec with no drift".
        run: |
          pnpm --filter @rentalcrm/openapi emit
          pnpm --filter @rentalcrm/sdk generate
          if ! git diff --exit-code openapi/openapi.json sdk/src/generated/; then
            echo ""
            echo "FAIL: OpenAPI spec or generated SDK is stale. Run:"
            echo "  pnpm --filter @rentalcrm/openapi emit"
            echo "  pnpm --filter @rentalcrm/sdk generate"
            echo "and commit the result."
            exit 1
          fi

  isolation:
    # Ephemeral Postgres service container; full migrations applied; two
    # real (non-privileged) auth users in two accounts; the test asserts
    # that under each user's RLS context, every public table returns ZERO
    # rows belonging to the OTHER account. Red on leak.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: 127.0.0.1
      PGPORT: '5432'
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install psql (postgresql-client)
        run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Wait for postgres
        run: |
          for i in $(seq 1 30); do
            pg_isready -h 127.0.0.1 -U postgres && exit 0
            sleep 1
          done
          echo "postgres did not become ready" >&2
          exit 1

      - name: Supabase compat primer
        run: psql -v ON_ERROR_STOP=1 -f db/test/supabase_compat.sql

      - name: Apply migrations
        run: |
          for f in db/supabase/migrations/*.sql; do
            echo "  apply $(basename "$f")"
            psql -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Seed two-account fixture
        run: psql -v ON_ERROR_STOP=1 -f db/test/seed_two_accounts.sql

      - name: Run isolation test (green path)
        run: pnpm --filter ./db test:isolation

      - name: Meaningfulness check (red on leak)
        # Plant a deliberately broken policy on public.properties and verify
        # the test detects the leak. Proves the harness is not vacuously
        # passing. CI fails if the test stays green under the leak.
        run: |
          psql -v ON_ERROR_STOP=1 -c "drop policy properties_member_all on public.properties; create policy properties_leak on public.properties for all using (true) with check (true);"
          set +e
          pnpm --filter ./db test:isolation
          rc=$?
          set -e
          # Restore the real policy regardless of outcome.
          # Restore the ADR-0003 initplan policy form (matches migration 20260615000002).
          psql -v ON_ERROR_STOP=1 -c "drop policy properties_leak on public.properties; create policy properties_member_all on public.properties for all using (account_id in (select m.account_id from public.account_members m where m.user_id = (select auth.uid()) and m.deleted_at is null)) with check (account_id in (select m.account_id from public.account_members m where m.user_id = (select auth.uid()) and m.deleted_at is null));"
          if [ "$rc" -eq 0 ]; then
            echo "FAIL: isolation test passed under a leaky policy on properties"
            exit 1
          fi
          echo "Meaningfulness check PASS: planted leak detected"

      - name: Run audit-spine DoD checks (Phase 3)
        # Runs against the same seeded DB. Verifies: edit -> new event; pre-edit
        # value in history; events immutable & undeletable for authenticated;
        # direct DB write produces an event; verify_chain detects a tampered
        # event; soft-delete emits a tombstone; logged_at is immutable.
        run: pnpm --filter ./db test:audit

      - name: Run money-spine DoD checks (Phase 6)
        # Derived balance / reversal-not-mutation / allocation integrity at
        # the DB / per-charge concurrent allocations / deposit segregation.
        # All enforcement-at-the-DB, runs against the same seeded fixtures.
        run: pnpm --filter ./db test:money

      - name: Run tenancy-status auto-advance checks
        # advance_tenancy_statuses flips only upcoming->active for started,
        # non-deleted tenancies; idempotent; leaves ended/holdover/active and
        # future-dated tenancies untouched; audit-attributed to system:cron:tenancy.
        run: pnpm --filter ./db test:tenancy-status

  integration:
    # Higher-fidelity tier: real GoTrue token issuance + real PostgREST claim
    # handling. This is the test that catches drift between our hand-minted
    # JWT path and what Supabase actually issues -- exactly where a cross-
    # tenant leak would hide. Slower than the other jobs (image pulls ~3min on
    # cold cache), so kept on its own tier rather than blocking the fast loop.
    # Bumped 20->30 when the agent/messaging/journal/events + phase9-12 suites
    # were wired in (this job's suite count roughly doubled); a timeout-induced
    # red would otherwise mask whether the newly-gated suites actually pass.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: supabase/setup-cli@v1
        with:
          version: '2.105.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Boot Supabase stack
        # `supabase start` auto-applies the migrations in db/supabase/migrations
        # and brings up Postgres + GoTrue + PostgREST + Storage + Realtime.
        working-directory: db
        run: supabase start

      - name: Run API-level cross-tenant isolation
        run: pnpm --filter ./api test:api-isolation

      - name: Run landlord profile checks
        # GET/PATCH /v1/profile against public.users: E.164 normalisation on
        # write, 422 on un-normalisable input, null-clears, display_name vs
        # phone independence, self-scope (auth.uid()-keyed), and the 401 guard.
        run: pnpm --filter ./api test:profile

      - name: Run entity-search DoD checks
        # Trigram search_entities() RPC behind GET /search: multi-type ranked
        # results, narrow (?types=) / exclude (?exclude=), email-fragment match,
        # the LIKE-metacharacter escape, and -- load-bearing -- cross-account
        # isolation via the SECURITY INVOKER RPC under real PostgREST RLS.
        run: pnpm --filter ./api test:search

      - name: Run intake DoD checks (Phase 7)
        # The public, unauthenticated, RLS-bypassing surface. Covers
        # forged-token rejection, area-scope-from-token, dedup, per-token
        # rate limit, auto-revoke on tenancy-end, and the actor='tenant:<id>'
        # audit attribution.
        run: pnpm --filter ./api test:intake

      - name: Run attachments + inspections DoD checks (Phase 8)
        # Server-side content hash; cross-account read denial; forced
        # Content-Disposition: attachment + nosniff + CSP on download;
        # intake attachments land at token-derived account path; PDF
        # determinism (same input -> same hash); completed-inspection
        # immutability; HTML upload rejected.
        run: pnpm --filter ./api test:attachments

      - name: Run ledger + pagination regression checks
        # Phase 0/1 architecture-plan guards: tenancy-scoped allocation
        # fetch (was account-wide), voided-charge unapplied credit, 400 on
        # garbage cursors, and a no-dup/no-gap pagination walk.
        run: pnpm --filter ./api test:ledger

      - name: Run onboarding-import DoD checks (Phase 1)
        # Full recognize -> map -> resolve -> preview -> confirm pipeline and
        # every decline/blocker branch, with the Anthropic client replaced by
        # a canned FakeAnthropic (__setAnthropicForTests) -- no API key
        # needed. Also covers cross-account isolation under the raw-pg
        # service_role executor and the HTTP-level idempotency/409/404/error-
        # envelope contract. The opt-in live-LLM smoke test
        # (test:imports-live) is intentionally NOT run here.
        run: pnpm --filter ./api test:imports

      - name: Run agent-principal DoD checks (ADR-0006/0009)
        # role='agent' principal classification, the journal firewall
        # (agent-only fields + approval gating), idempotency principal
        # isolation, and the proposal-lifecycle entry_type vocabulary.
        run: pnpm --filter ./api test:agent-principal

      - name: Run agent-grant lifecycle checks (ADR-0009 Phase 2)
        # Landlord enable/revoke: provisioning the per-account service-account
        # user + membership, the active-grant guard (409), the revoke RLS kill
        # (membership soft-delete), identity reuse across re-enable, and
        # owner/manager authorization.
        run: pnpm --filter ./api test:agent-grants

      - name: Run agent token exchange checks (ADR-0009 Phase 3)
        # Root-secret auth, per-account session minting, grant-gated 403,
        # post-revoke list/token denial, and the 42501→403 RLS-denial mapping.
        run: pnpm --filter ./api test:agent-tokens

      - name: Run agent grant<->membership invariant checks (incident 2026-06-25)
        # The agent_grants source-of-truth invariant: the projection trigger,
        # the out-of-band soft-delete guard, and clean revoke/re-enable so the
        # membership (authz) and grant (discovery) can never diverge into the
        # permanent 404 loop the incident hit.
        run: pnpm --filter ./api test:agent-membership-divergence

      - name: Run interactions evidentiary-journal checks
        # Append-only correction/retraction chains: amend, retract, linear-
        # chain guards (no correcting a superseded entry), immutability (no
        # PATCH/DELETE), cross-account corrects_id → 404, and audit attribution.
        run: pnpm --filter ./api test:interactions-journal

      - name: Run events feed + ledger as_of checks (Phase 3)
        # Poller contract under concurrency (40 POSTs, cursor drain), next_seq
        # semantics, entity_type filter, cross-account isolation, validation
        # 400s, and ledger point-in-time as_of accounting.
        run: pnpm --filter ./api test:events-feed

      - name: Run Phase 9 DoD checks
        # Cron idempotency (generate_rent_charges / generate_scheduled_task_runs),
        # HEIC transcoding + provenance, per-IP DB rate limit (survives restart),
        # and Storage RLS cross-account direct denial.
        run: pnpm --filter ./api test:phase9

      - name: Run Phase 10 DoD checks (evidence export bundle)
        # Full export round-trip, audit chain status in bundle, tampered-chain
        # detection, soft-deleted tenancy export, HEIC photo provenance,
        # hardened download proxy headers, and cross-account isolation.
        run: pnpm --filter ./api test:phase10

      - name: Run Phase 11 DoD checks
        # verify_chain_sweep tamper detection + alert dedup, prune_ip_rate_buckets,
        # prune_idempotency_keys safety invariant, date-range export opening
        # balance, broken-chain structured stderr, and reference CLI end-to-end walk.
        run: pnpm --filter ./api test:phase11

      - name: Run Phase 12 DoD checks
        # Guide-vs-spec drift fixes: GET /v1/me, DELETE inspection-template,
        # DELETE inspection item (completion-gate). Each route verified in
        # openapi.json AND reachable via the generated SDK over a real HTTP round trip.
        run: pnpm --filter ./api test:phase12

      - name: Stop Supabase stack
        if: always()
        working-directory: db
        run: supabase stop --no-backup
