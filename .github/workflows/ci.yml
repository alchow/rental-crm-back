name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan all commits on PRs.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No GITLEAKS_LICENSE: this repo is private-org-scoped under a
          # personal account / small org. If gitleaks-action ever requires
          # it (paid-org enforcement), set it as a repo secret.

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Service-role quarantine (grep)
        run: pnpm lint:service-role

      - name: Admin quarantine (ESLint rule regression)
        run: pnpm lint:admin-quarantine

      - name: JWT middleware unit test
        run: pnpm --filter ./api test:auth

      - name: Contract drift (OpenAPI + SDK regenerated cleanly)
        # The committed openapi/openapi.json and sdk/src/generated/types.ts
        # are the source-of-truth client contract. Regenerate them from the
        # zod schemas; if the diff is non-empty, a route or schema changed
        # without the spec/SDK being committed -- the brief calls this
        # "SDK builds from the spec with no drift".
        run: |
          pnpm --filter @rentalcrm/openapi emit
          pnpm --filter @rentalcrm/sdk generate
          if ! git diff --exit-code openapi/openapi.json sdk/src/generated/; then
            echo ""
            echo "FAIL: OpenAPI spec or generated SDK is stale. Run:"
            echo "  pnpm --filter @rentalcrm/openapi emit"
            echo "  pnpm --filter @rentalcrm/sdk generate"
            echo "and commit the result."
            exit 1
          fi

  isolation:
    # Ephemeral Postgres service container; full migrations applied; two
    # real (non-privileged) auth users in two accounts; the test asserts
    # that under each user's RLS context, every public table returns ZERO
    # rows belonging to the OTHER account. Red on leak.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: 127.0.0.1
      PGPORT: '5432'
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install psql (postgresql-client)
        run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Wait for postgres
        run: |
          for i in $(seq 1 30); do
            pg_isready -h 127.0.0.1 -U postgres && exit 0
            sleep 1
          done
          echo "postgres did not become ready" >&2
          exit 1

      - name: Supabase compat primer
        run: psql -v ON_ERROR_STOP=1 -f db/test/supabase_compat.sql

      - name: Apply migrations
        run: |
          for f in db/supabase/migrations/*.sql; do
            echo "  apply $(basename "$f")"
            psql -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Seed two-account fixture
        run: psql -v ON_ERROR_STOP=1 -f db/test/seed_two_accounts.sql

      - name: Run isolation test (green path)
        run: pnpm --filter ./db test:isolation

      - name: Meaningfulness check (red on leak)
        # Plant a deliberately broken policy on public.properties and verify
        # the test detects the leak. Proves the harness is not vacuously
        # passing. CI fails if the test stays green under the leak.
        run: |
          psql -v ON_ERROR_STOP=1 -c "drop policy properties_member_all on public.properties; create policy properties_leak on public.properties for all using (true) with check (true);"
          set +e
          pnpm --filter ./db test:isolation
          rc=$?
          set -e
          # Restore the real policy regardless of outcome.
          psql -v ON_ERROR_STOP=1 -c "drop policy properties_leak on public.properties; create policy properties_member_all on public.properties for all using (public.is_account_member(account_id)) with check (public.is_account_member(account_id));"
          if [ "$rc" -eq 0 ]; then
            echo "FAIL: isolation test passed under a leaky policy on properties"
            exit 1
          fi
          echo "Meaningfulness check PASS: planted leak detected"

      - name: Run audit-spine DoD checks (Phase 3)
        # Runs against the same seeded DB. Verifies: edit -> new event; pre-edit
        # value in history; events immutable & undeletable for authenticated;
        # direct DB write produces an event; verify_chain detects a tampered
        # event; soft-delete emits a tombstone; logged_at is immutable.
        run: pnpm --filter ./db test:audit

  integration:
    # Higher-fidelity tier: real GoTrue token issuance + real PostgREST claim
    # handling. This is the test that catches drift between our hand-minted
    # JWT path and what Supabase actually issues -- exactly where a cross-
    # tenant leak would hide. Slower than the other jobs (image pulls ~3min on
    # cold cache), so kept on its own tier rather than blocking the fast loop.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: supabase/setup-cli@v1
        with:
          version: '2.105.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Boot Supabase stack
        # `supabase start` auto-applies the migrations in db/supabase/migrations
        # and brings up Postgres + GoTrue + PostgREST + Storage + Realtime.
        working-directory: db
        run: supabase start

      - name: Run API-level cross-tenant isolation
        run: pnpm --filter ./api test:api-isolation

      - name: Stop Supabase stack
        if: always()
        working-directory: db
        run: supabase stop --no-backup
